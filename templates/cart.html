{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Shree Varahi Traders</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #111827;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo img { height: 36px; }

        .header-logo span {
            font-size: clamp(15px, 4vw, 22px);
            font-weight: 600;
            color: #facc15;
        }

        .header a {
            color: #d1d5db;
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
        }

        .header a:hover { color: #facc15; }

        .page {
            display: flex;
            gap: 24px;
            padding: 24px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cart-left { flex: 2; min-width: 280px; }

        .cart-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cart-count {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .sort-bar label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        .sort-bar select {
            padding: 7px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .cart-item {
            background: white;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            gap: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            align-items: flex-start;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
            border: 1px solid #e5e7eb;
        }

        .item-info { flex: 1; min-width: 0; }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 3px;
        }

        .item-meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .item-price {
            font-size: 17px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 10px;
        }

        .qty-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .qty-box {
            display: flex;
            align-items: center;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            overflow: hidden;
        }

        .qty-btn {
            background: #f3f4f6;
            border: none;
            padding: 6px 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .qty-btn:hover { background: #e5e7eb; }

        .qty-num {
            padding: 6px 14px;
            font-size: 15px;
            font-weight: 600;
            min-width: 36px;
            text-align: center;
            border-left: 1px solid #d1d5db;
            border-right: 1px solid #d1d5db;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline;
        }

        .remove-btn:hover { color: #b91c1c; }

        .item-subtotal {
            font-size: 13px;
            color: #6b7280;
            text-align: right;
            white-space: nowrap;
            align-self: center;
            flex-shrink: 0;
        }

        .item-subtotal span {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #111827;
        }

        .empty-cart {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        .empty-cart .icon { font-size: 52px; margin-bottom: 14px; }
        .empty-cart p { color: #6b7280; margin-bottom: 18px; }

        .shop-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .cart-right { flex: 1; min-width: 260px; }

        .summary-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            position: sticky;
            top: 20px;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 10px;
            color: #374151;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            border-top: 1px solid #e5e7eb;
            padding-top: 12px;
            margin-top: 6px;
        }

        .checkout-btn {
            display: block;
            margin-top: 18px;
            padding: 12px;
            background: #2563eb;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .checkout-btn:hover { background: #1d4ed8; }

        .whatsapp-btn {
            display: block;
            margin-top: 10px;
            padding: 12px;
            background: #16a34a;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .whatsapp-btn:hover { background: #15803d; }

        .secure-note {
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
            margin-top: 12px;
        }

        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 640px) {
            .page {
                flex-direction: column;
                padding: 12px;
                gap: 16px;
            }

            .cart-left, .cart-right {
                min-width: 0;
                width: 100%;
            }

            .cart-title { font-size: 19px; }

            .cart-item {
                padding: 11px;
                gap: 10px;
            }

            .cart-item img {
                width: 75px;
                height: 75px;
            }

            .item-name { font-size: 13px; }
            .item-meta { font-size: 11px; }
            .item-price { font-size: 15px; margin-bottom: 8px; }

            .qty-btn { padding: 5px 10px; font-size: 15px; }
            .qty-num { padding: 5px 10px; font-size: 14px; min-width: 30px; }

            .item-subtotal { display: none; } /* subtotal shown in item-price on mobile */

            .summary-box { position: static; }

            .summary-row.total { font-size: 16px; }

            .checkout-btn, .whatsapp-btn { font-size: 14px; padding: 11px; }
        }
    </style>
</head>

<body>

<div class="header">
    <div class="header-logo">
        <img src="{% static 'images/logo.png' %}" alt="Logo">
        <span>Shree Varahi Traders</span>
    </div>
    <a href="{% url 'product_list' %}">&#8592; Continue Shopping</a>
</div>

<div class="page">

    <div class="cart-left">
        <div class="cart-title">Shopping Cart</div>
        <div class="cart-count" id="cartCount"></div>

        <div class="sort-bar">
            <label>Sort by:</label>
            <select id="cartSort" onchange="renderCart()">
                <option value="">Default</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="name_asc">Name: A to Z</option>
                <option value="name_desc">Name: Z to A</option>
            </select>
        </div>

        <div id="cartItems"></div>
    </div>

    <div class="cart-right">
        <div class="summary-box">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row">
                <span>Items (<span id="summaryCount">0</span>)</span>
                <span>Rs. <span id="summarySubtotal">0</span></span>
            </div>
            <div class="summary-row">
                <span>Delivery</span>
                <span>Calculated at checkout</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span>Rs. <span id="summaryTotal">0</span></span>
            </div>

            <button class="checkout-btn">Proceed to Checkout</button>
            <a href="#" class="whatsapp-btn" id="whatsappOrder">Order via WhatsApp</a>
            <div class="secure-note">Secure and trusted checkout</div>
        </div>
    </div>

</div>

<script>
    function getCart() {
        return JSON.parse(localStorage.getItem('varahi_cart') || '[]');
    }

    function saveCart(cart) {
        localStorage.setItem('varahi_cart', JSON.stringify(cart));
    }

    function updateQty(index, delta) {
        var cart = getCart();
        cart[index].qty += delta;
        if (cart[index].qty < 1) cart[index].qty = 1;
        saveCart(cart);
        renderCart();
    }

    function removeItem(index) {
        var cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        renderCart();
    }

    function renderCart() {
        var cart = getCart();
        var sort = document.getElementById('cartSort').value;

        if (sort === 'price_asc') cart.sort(function(a, b) { return a.price - b.price; });
        else if (sort === 'price_desc') cart.sort(function(a, b) { return b.price - a.price; });
        else if (sort === 'name_asc') cart.sort(function(a, b) { return a.name.localeCompare(b.name); });
        else if (sort === 'name_desc') cart.sort(function(a, b) { return b.name.localeCompare(a.name); });

        var container = document.getElementById('cartItems');
        var countEl = document.getElementById('cartCount');

        if (cart.length === 0) {
            container.innerHTML =
                '<div class="empty-cart">' +
                '<div class="icon">🛒</div>' +
                '<p>Your cart is empty.</p>' +
                '<a href="/" class="shop-btn">Browse Products</a>' +
                '</div>';
            countEl.textContent = '';
            document.getElementById('summaryCount').textContent = 0;
            document.getElementById('summarySubtotal').textContent = '0';
            document.getElementById('summaryTotal').textContent = '0';
            document.getElementById('whatsappOrder').href = '#';
            return;
        }

        var total = 0;
        var totalQty = 0;
        var html = '';
        var waLines = [];

        cart.forEach(function(item, i) {
            var subtotal = item.price * item.qty;
            total += subtotal;
            totalQty += item.qty;
            waLines.push(item.name + ' x' + item.qty + ' - Rs.' + subtotal);

            html +=
                '<div class="cart-item">' +
                '<img src="' + (item.image || 'https://placehold.co/100x100/e5e7eb/9ca3af?text=No+Image') + '" ' +
                'alt="' + item.name + '" ' +
                'onerror="this.src=\'https://placehold.co/100x100/e5e7eb/9ca3af?text=No+Image\'">' +
                '<div class="item-info">' +
                '<div class="item-name">' + item.name + '</div>' +
                '<div class="item-meta">' + item.category + ' - ' + item.material + '</div>' +
                '<div class="item-price">Rs. ' + item.price.toLocaleString('en-IN') + '</div>' +
                '<div class="qty-row">' +
                '<div class="qty-box">' +
                '<button class="qty-btn" onclick="updateQty(' + i + ', -1)">-</button>' +
                '<div class="qty-num">' + item.qty + '</div>' +
                '<button class="qty-btn" onclick="updateQty(' + i + ', 1)">+</button>' +
                '</div>' +
                '<button class="remove-btn" onclick="removeItem(' + i + ')">Remove</button>' +
                '</div>' +
                '</div>' +
                '<div class="item-subtotal">Subtotal<span>Rs. ' + subtotal.toLocaleString('en-IN') + '</span></div>' +
                '</div>';
        });

        container.innerHTML = html;
        countEl.textContent = totalQty + ' item' + (totalQty !== 1 ? 's' : '') + ' in your cart';
        document.getElementById('summaryCount').textContent = totalQty;
        document.getElementById('summarySubtotal').textContent = total.toLocaleString('en-IN');
        document.getElementById('summaryTotal').textContent = total.toLocaleString('en-IN');

        var waMsg = 'New Order:%0A' + waLines.join('%0A') + '%0ATotal: Rs.' + total;
        document.getElementById('whatsappOrder').href = 'https://wa.me/918639556127?text=' + waMsg;
    }

    renderCart();
</script>

</body>
</html>
